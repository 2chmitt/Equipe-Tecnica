<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Demonstrativos do Técnico</title>

  <!-- favicon -->
  <link rel="icon" type="image/png" href="/static/imagem2.png" />
  <link rel="apple-touch-icon" href="/static/imagem2.png" />

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-content">
    <img src="/static/imagem3.png" class="logo" alt="Logo" />
    <h1>Demonstrativos BB</h1>
      <nav class="menu">
        <a href="/" class="menu-link ativo">Consulta</a>
        <a href="/extratos" class="menu-link">Pagamentos</a>
        <a href="/inex" class="menu-link">Gerador de Extratos</a>
      </nav>
  </div>
</header>

<main class="page">

  <!-- FORM -->
  <section class="card form-card">
    <form id="consultaForm">

      <div class="field autocomplete">
        <label>Município</label>
        <input type="text" id="municipioInput" autocomplete="off" />
        <ul id="sugestoes" class="sugestoes"></ul>
      </div>

      <input type="hidden" id="codigoMunicipio" />
      <input type="hidden" id="ufMunicipio" />

      <div class="field">
        <label>Data inicial</label>
        <input type="date" id="data_inicio" />
      </div>

      <div class="field">
        <label>Data final</label>
        <input type="date" id="data_fim" />
      </div>

      <div class="actions">
        <button type="submit" id="btnConsultar">Consultar</button>
      </div>

      <div id="status" class="status hidden">Consultando dados…</div>
    </form>
  </section>

  <!-- RESULTADO -->
  <section class="card resultado-card">
    <h2>Resultado</h2>

    <div class="linha-info">
      <strong>Município:</strong>
      <span id="res-municipio">—</span>
    </div>

    <div class="linha-info">
      <strong>Período:</strong>
      <span id="res-periodo">—</span>
    </div>

    <div class="linha-info">
      <strong>População residente (Censo 2010):</strong>
      <span id="res-ibge-2010">—</span>
    </div>

    <!-- FPM -->
    <div class="bloco-valor">
      <div class="bloco-left">
        <span class="chave">fpm:</span>
        <span id="valor-fpm" class="valor">—</span>
      </div>
      <div class="acoes">
        <button type="button" class="btn-copy" data-copy="fpm-raw"> 📋 </button>
        <button type="button" class="btn-copy" data-copy="fpm-brl"> 💰 </button>
        <button type="button" class="btn-copy btn-extrato" id="btnExtratoFpm"> 📄 </button>
      </div>
    </div>

    <!-- ROYALTIES -->
    <div class="bloco-valor">
      <div class="bloco-left">
        <span class="chave">royalties:</span>
        <span id="valor-royalties" class="valor">—</span>
      </div>
      <div class="acoes">
        <button type="button" class="btn-copy" data-copy="royalties-raw"> 📋 </button>
        <button type="button" class="btn-copy" data-copy="royalties-brl"> 💰 </button>
        <button type="button" class="btn-copy btn-extrato" id="btnExtratoRoyalties"> 📄 </button>
      </div>
    </div>

    <!-- TODOS -->
    <div class="bloco-valor">
      <div class="bloco-left">
        <span class="chave">todos:</span>
        <span id="valor-todos" class="valor">—</span>
      </div>
      <div class="acoes">
        <button type="button" class="btn-copy" data-copy="todos-raw"> 📋 </button>
        <button type="button" class="btn-copy" data-copy="todos-brl"> 💰 </button>
        <button type="button" class="btn-copy btn-extrato" id="btnExtratoTodos"> 📄 </button>
      </div>
    </div>

  </section>

  <!-- HISTÓRICO -->
  <section class="card historico-card">
    <h2>Histórico <span class="hint">(clique para visualizar)</span></h2>
    <ul id="historico"></ul>
  </section>

</main>

<footer class="footer">
  © copyright by <strong>Gabriel Antunez Schmitt</strong>
</footer>

<script src="/static/script.js"></script>
</body>
</html>
